basePath: /api/v1
definitions:
  catalog.ApproveMedicineCandidateRequest:
    properties:
      atc_code:
        type: string
      brand_name:
        type: string
      decision_note:
        type: string
      form:
        type: string
      generic_name:
        type: string
      is_active:
        type: boolean
      medicine_id:
        type: string
      pack_size:
        type: string
      strength:
        type: string
    type: object
  catalog.ApproveMedicineCandidateResponse:
    properties:
      candidate:
        $ref: '#/definitions/catalog.MedicineCandidateResponse'
      medicine:
        $ref: '#/definitions/catalog.MedicineSummary'
    type: object
  catalog.CreateMedicineCandidateRequest:
    properties:
      atc_code:
        type: string
      brand_name:
        type: string
      force_submit:
        type: boolean
      form:
        type: string
      generic_name:
        type: string
      pack_size:
        type: string
      strength:
        type: string
    type: object
  catalog.ImportValidationResponse:
    properties:
      candidates:
        items:
          $ref: '#/definitions/catalog.MedicineSuggestion'
        type: array
      matched_medicine:
        $ref: '#/definitions/catalog.MedicineSummary'
      normalized:
        $ref: '#/definitions/catalog.NormalizedMedicineInput'
      pending_candidate:
        $ref: '#/definitions/catalog.PendingCandidateSummary'
      status:
        $ref: '#/definitions/catalog.MatchStatus'
      suggested_medicine:
        $ref: '#/definitions/catalog.MedicineSuggestion'
      warnings:
        items:
          $ref: '#/definitions/catalog.ValidationWarning'
        type: array
    type: object
  catalog.ListMedicineCandidatesResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/catalog.MedicineCandidateResponse'
        type: array
    type: object
  catalog.MatchStatus:
    enum:
    - MATCHED
    - AMBIGUOUS
    - SUGGESTED_MATCH
    - NEW_MEDICINE
    - PENDING_REVIEW
    type: string
    x-enum-varnames:
    - MatchStatusMatched
    - MatchStatusAmbiguous
    - MatchStatusSuggestedMatch
    - MatchStatusNewMedicine
    - MatchStatusPendingReview
  catalog.MedicineCandidateResponse:
    properties:
      admin_decision_note:
        type: string
      atc_code:
        type: string
      brand_name:
        type: string
      created_at:
        type: string
      form:
        type: string
      generic_name:
        type: string
      id:
        type: string
      matched_medicine_id:
        type: string
      pack_size:
        type: string
      reviewed_at:
        type: string
      reviewed_by:
        type: string
      status:
        $ref: '#/definitions/model.MedicineCandidateStatus'
      strength:
        type: string
      updated_at:
        type: string
      wholesaler_id:
        type: string
    type: object
  catalog.MedicineImportPayload:
    properties:
      atc_code:
        type: string
      brand_name:
        type: string
      form:
        type: string
      generic_name:
        type: string
      pack_size:
        type: string
      strength:
        type: string
    type: object
  catalog.MedicineSuggestion:
    properties:
      medicine:
        $ref: '#/definitions/catalog.MedicineSummary'
      score:
        type: number
    type: object
  catalog.MedicineSummary:
    properties:
      atc_code:
        type: string
      brand_name:
        type: string
      form:
        type: string
      generic_name:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      pack_size:
        type: string
      strength:
        type: string
    type: object
  catalog.NormalizedMedicineInput:
    properties:
      brand_name:
        type: string
      form:
        type: string
      generic_name:
        type: string
      strength:
        type: string
    type: object
  catalog.PendingCandidateSummary:
    properties:
      created_at:
        type: string
      id:
        type: string
      status:
        $ref: '#/definitions/model.MedicineCandidateStatus'
    type: object
  catalog.RejectMedicineCandidateRequest:
    properties:
      decision_note:
        type: string
    type: object
  catalog.UpsertMedicineInput:
    properties:
      atc_code:
        type: string
      brand_name:
        type: string
      form:
        type: string
      generic_name:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      pack_size:
        type: string
      strength:
        type: string
    type: object
  catalog.ValidationWarning:
    properties:
      code:
        type: string
      field:
        type: string
      message:
        type: string
    type: object
  model.MedicineCandidateStatus:
    enum:
    - PENDING
    - APPROVED
    - REJECTED
    type: string
    x-enum-varnames:
    - MedicineCandidateStatusPending
    - MedicineCandidateStatusApproved
    - MedicineCandidateStatusRejected
  model.UserRole:
    enum:
    - PHARMACY
    - WHOLESALER
    - MANUFACTURER
    - ADMIN
    type: string
    x-enum-varnames:
    - UserRolePharmacy
    - UserRoleWholesaler
    - UserRoleManufacturer
    - UserRoleAdmin
  offers.UpsertOfferInput:
    properties:
      available_qty:
        type: integer
      currency:
        type: string
      display_price:
        type: string
      expiry_date:
        type: string
      is_active:
        type: boolean
      medicine_id:
        type: string
    type: object
  payments.WebhookInput:
    properties:
      invoice_id:
        type: string
      status:
        type: string
      transaction_id:
        type: string
    type: object
  response.ErrorEnvelope:
    properties:
      error:
        properties:
          code:
            type: string
          details: {}
          message:
            type: string
        type: object
    type: object
  users.LoginRequest:
    properties:
      identifier:
        type: string
      password:
        type: string
    type: object
  users.RegisterProfile:
    properties:
      address:
        type: string
      city:
        type: string
      country:
        type: string
      license_no:
        type: string
      name:
        type: string
      registration_no:
        type: string
    type: object
  users.RegisterRequest:
    properties:
      email:
        type: string
      password:
        type: string
      phone:
        type: string
      profile:
        $ref: '#/definitions/users.RegisterProfile'
      role:
        $ref: '#/definitions/model.UserRole'
    type: object
info:
  contact: {}
  description: Backend API for PharmaLink B2B marketplace
  title: PharmaLink API
  version: "1.0"
paths:
  /admin/medicine-candidates/:
    get:
      parameters:
      - description: candidate status
        in: query
        name: status
        type: string
      - description: limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/catalog.ListMedicineCandidatesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: List medicine candidates waiting for review (Admin)
      tags:
      - admin
  /admin/medicine-candidates/{id}/approve:
    post:
      consumes:
      - application/json
      parameters:
      - description: medicine candidate id
        in: path
        name: id
        required: true
        type: string
      - description: approve payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/catalog.ApproveMedicineCandidateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/catalog.ApproveMedicineCandidateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Approve medicine candidate (Admin)
      tags:
      - admin
  /admin/medicine-candidates/{id}/reject:
    post:
      consumes:
      - application/json
      parameters:
      - description: medicine candidate id
        in: path
        name: id
        required: true
        type: string
      - description: reject payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/catalog.RejectMedicineCandidateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
