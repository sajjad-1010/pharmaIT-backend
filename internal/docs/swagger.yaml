        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Reject medicine candidate (Admin)
      tags:
      - admin
  /admin/medicines/:
    post:
      consumes:
      - application/json
      parameters:
      - description: medicine payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/catalog.UpsertMedicineInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Create medicine (Admin)
      tags:
      - catalog
  /admin/medicines/{id}:
    patch:
      consumes:
      - application/json
      parameters:
      - description: medicine id
        in: path
        name: id
        required: true
        type: string
      - description: medicine payload
        in: body
        name: request
        required: true
