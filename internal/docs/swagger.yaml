basePath: /api/v1
definitions:
  model.NotificationDevice:
    properties:
      createdAt:
        type: string
      deviceLabel:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      lastSeenAt:
        type: string
      platform:
        $ref: '#/definitions/model.NotificationDevicePlatform'
      token:
        type: string
      updatedAt:
        type: string
      userID:
        type: string
    type: object
  model.NotificationDevicePlatform:
    enum:
    - ANDROID
    - WEB
    type: string
    x-enum-varnames:
    - NotificationDevicePlatformAndroid
    - NotificationDevicePlatformWeb
  model.NotificationPreference:
    properties:
      accessUpdated:
        type: boolean
      createdAt:
        type: string
      inAppEnabled:
        type: boolean
      manufacturerQuoteCreated:
        type: boolean
      manufacturerRequestCreated:
        type: boolean
      orderCreated:
        type: boolean
      orderStatusChanged:
        type: boolean
      paymentUpdated:
        type: boolean
      pushEnabled:
        type: boolean
      rareBidReceived:
        type: boolean
      rareBidSelected:
        type: boolean
      updatedAt:
        type: string
      userID:
        type: string
    type: object
  model.OrderStatus:
    enum:
    - CREATED
    - CONFIRMED
    - PACKING
    - SHIPPED
    - DELIVERED
    - CANCELED
    type: string
    x-enum-varnames:
    - OrderStatusCreated
    - OrderStatusConfirmed
    - OrderStatusPacking
    - OrderStatusShipped
    - OrderStatusDelivered
    - OrderStatusCanceled
  model.UserRole:
    enum:
    - PHARMACY
    - WHOLESALER
    - MANUFACTURER
    - ADMIN
    type: string
    x-enum-varnames:
    - UserRolePharmacy
    - UserRoleWholesaler
    - UserRoleManufacturer
    - UserRoleAdmin
  model.WholesalerOffer:
    properties:
      availableQty:
        type: integer
      createdAt:
        type: string
      displayPrice:
        type: number
      expiryDate:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      name:
        type: string
      producer:
        type: string
      updatedAt:
        type: string
      wholesalerID:
        type: string
    type: object
  notifications.DeviceUpsertInput:
    properties:
      device_label:
        type: string
      platform:
        $ref: '#/definitions/model.NotificationDevicePlatform'
      token:
        type: string
    type: object
  notifications.PreferencePatch:
    properties:
      access_updated:
        type: boolean
      in_app_enabled:
        type: boolean
      manufacturer_quote_created:
        type: boolean
      manufacturer_request_created:
        type: boolean
      order_created:
        type: boolean
      order_status_changed:
        type: boolean
      payment_updated:
        type: boolean
      push_enabled:
        type: boolean
      rare_bid_received:
        type: boolean
      rare_bid_selected:
        type: boolean
    type: object
  offers.BatchCreateInput:
    properties:
      items:
        items:
          $ref: '#/definitions/offers.UpsertOfferInput'
        type: array
    type: object
  offers.BatchCreateResult:
    properties:
      created_count:
        type: integer
      errors:
        items:
          $ref: '#/definitions/offers.BatchError'
        type: array
      failed_count:
        type: integer
      items:
        items:
          $ref: '#/definitions/model.WholesalerOffer'
        type: array
    type: object
  offers.BatchError:
    properties:
      code:
        type: string
      details: {}
      index:
        type: integer
      message:
        type: string
    type: object
  offers.UpsertOfferInput:
    properties:
      display_price:
        type: string
      expiry_date:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      producer:
        type: string
    type: object
  orders.OrderItemSummary:
    properties:
      ID:
        type: string
      ItemName:
        type: string
      LineTotal:
        type: number
      OfferID:
        type: string
      Producer:
        type: string
      Qty:
        type: integer
      UnitPrice:
        type: number
    type: object
  orders.OrderSummary:
    properties:
      CreatedAt:
        type: string
      Currency:
        type: string
      ID:
        type: string
      Items:
        items:
          $ref: '#/definitions/orders.OrderItemSummary'
        type: array
      PharmacyAddress:
        type: string
      PharmacyCity:
        type: string
      PharmacyEmail:
        type: string
      PharmacyID:
        type: string
      PharmacyLicenseNo:
        type: string
      PharmacyName:
        type: string
      PharmacyPhone:
        type: string
      Status:
        $ref: '#/definitions/model.OrderStatus'
      TotalAmount:
        type: number
      UpdatedAt:
        type: string
      WholesalerID:
        type: string
    type: object
  payments.WebhookInput:
    properties:
      invoice_id:
        type: string
      status:
        type: string
      transaction_id:
        type: string
    type: object
  response.ErrorEnvelope:
    properties:
      error:
        properties:
          code:
            type: string
          details: {}
          message:
            type: string
        type: object
    type: object
  users.LoginRequest:
    properties:
      identifier:
        type: string
      password:
        type: string
    type: object
  users.RegisterProfile:
    properties:
      address:
        type: string
      city:
        type: string
      country:
        type: string
      license_no:
        type: string
      name:
        type: string
      registration_no:
        type: string
    type: object
  users.RegisterRequest:
    properties:
      email:
        type: string
      password:
        type: string
      phone:
        type: string
      profile:
        $ref: '#/definitions/users.RegisterProfile'
      role:
        $ref: '#/definitions/model.UserRole'
    type: object
info:
  contact: {}
  description: Backend API for PharmaLink B2B marketplace
  title: PharmaLink API
  version: "1.0"
paths:
  /admin/users:
    get:
      parameters:
      - description: role
        in: query
        name: role
        type: string
      - description: status
        in: query
        name: status
        type: string
      - description: limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: List users (Admin)
      tags:
      - admin
  /admin/users/{id}/status:
    patch:
      consumes:
      - application/json
      parameters:
      - description: user id
        in: path
        name: id
        required: true
        type: string
      - description: status payload
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Update user status (Admin)
      tags:
      - admin
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with email/phone and password
      parameters:
      - description: login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/users.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Current user profile
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: refresh payload
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Refresh access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register PHARMACY/WHOLESALER/MANUFACTURER user with profile
      parameters:
      - description: register payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/users.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Register new user
      tags:
      - auth
  /inventory/movements:
    post:
      consumes:
      - application/json
      parameters:
      - description: movement payload
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Add inventory movement (Wholesaler)
      tags:
      - inventory
  /inventory/stock:
    get:
      parameters:
      - description: offer id
        in: query
        name: offer_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Get current stock by offer (Wholesaler)
      tags:
      - inventory
  /notifications/:
    get:
      parameters:
      - description: limit
        in: query
        name: limit
        type: integer
      - description: cursor
        in: query
        name: cursor
        type: string
      - description: unread only
        in: query
        name: unread_only
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: List notifications
      tags:
      - notifications
  /notifications/{id}/read:
    post:
      parameters:
      - description: notification id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Mark notification as read
      tags:
      - notifications
  /notifications/devices:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.NotificationDevice'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: List notification devices
      tags:
      - notifications
    post:
      consumes:
      - application/json
      parameters:
      - description: device payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/notifications.DeviceUpsertInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.NotificationDevice'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Register or refresh notification device
      tags:
      - notifications
  /notifications/devices/{id}:
    delete:
      parameters:
      - description: device id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Deactivate notification device
      tags:
      - notifications
  /notifications/preferences:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.NotificationPreference'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Get notification preferences
      tags:
      - notifications
    put:
      consumes:
      - application/json
      parameters:
      - description: preferences payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/notifications.PreferencePatch'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.NotificationPreference'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Update notification preferences
      tags:
      - notifications
  /notifications/read-all:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Mark all notifications as read
      tags:
      - notifications
  /offers:
    get:
      parameters:
      - description: offer name query
        in: query
        name: query
        type: string
      - description: limit
        in: query
        name: limit
        type: integer
      - description: cursor
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: List offers
      tags:
      - offers
  /offers/:
    post:
      consumes:
      - application/json
      parameters:
      - description: offer payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/offers.UpsertOfferInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Create offer (Wholesaler)
      tags:
      - offers
  /offers/{id}:
    patch:
      consumes:
      - application/json
      parameters:
      - description: offer id
        in: path
        name: id
        required: true
        type: string
      - description: offer payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/offers.UpsertOfferInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Update offer (Wholesaler)
      tags:
      - offers
  /offers/batch:
    post:
      consumes:
      - application/json
      parameters:
      - description: batch offer payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/offers.BatchCreateInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/offers.BatchCreateResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Create offers in batch (Wholesaler)
      tags:
      - offers
  /orders/:
    get:
      parameters:
      - description: limit
        in: query
        name: limit
        type: integer
      - description: cursor
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/orders.OrderSummary'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: List orders
      tags:
      - orders
    post:
      consumes:
      - application/json
      parameters:
      - description: order payload
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/orders.OrderSummary'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Create order (Pharmacy)
      tags:
      - orders
  /orders/{id}:
    get:
      parameters:
      - description: order id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Get order by id
      tags:
      - orders
  /orders/{id}/status:
    patch:
      consumes:
      - application/json
      parameters:
      - description: order id
        in: path
        name: id
        required: true
        type: string
      - description: status payload
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Update order status
      tags:
      - orders
  /payments/access:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Get current access pass
      tags:
      - payments
  /payments/invoice:
    post:
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Create payment invoice
      tags:
      - payments
  /payments/webhook:
    post:
      consumes:
      - application/json
      parameters:
      - description: HMAC-SHA256 signature (hex)
        in: header
        name: X-Signature
        required: true
        type: string
      - description: webhook payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/payments.WebhookInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Payment webhook callback
      tags:
      - payments
  /stream/offers:
    get:
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
      summary: SSE stream for offer, inventory, and order status updates
      tags:
      - stream
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
