worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    log_format json_combined escape=json
      '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status":$status,'
      '"body_bytes_sent":$body_bytes_sent,'
      '"request_time":$request_time,'
      '"upstream_response_time":"$upstream_response_time",'
      '"http_referer":"$http_referer",'
      '"http_user_agent":"$http_user_agent",'
      '"request_id":"$request_id"'
      '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=8r/m;
    limit_req_zone $binary_remote_addr zone=search_zone:10m rate=90r/m;
    limit_req_zone $binary_remote_addr zone=stream_zone:10m rate=20r/m;

    upstream pharmalink_api {
        server api:8080;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        error_page 429 = @rate_limited_json;

        location /api/v1/auth/login {
            limit_req zone=login_zone burst=10 nodelay;
            proxy_pass http://pharmalink_api;
        }

        location /api/v1/medicines {
            limit_req zone=search_zone burst=50 nodelay;
            proxy_pass http://pharmalink_api;
        }

        location /api/v1/offers {
            limit_req zone=search_zone burst=50 nodelay;
            proxy_pass http://pharmalink_api;
        }

        location /api/v1/stream/offers {
            limit_req zone=stream_zone burst=20 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass http://pharmalink_api;
        }

        location / {
            proxy_pass http://pharmalink_api;
        }

        location @rate_limited_json {
            default_type application/json;
            add_header Content-Type application/json always;
            return 429 '{"error":{"code":"RATE_LIMITED","message":"Too many requests. Try again soon."}}';
        }
    }
}

