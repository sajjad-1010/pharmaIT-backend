services:
  postgres:
    image: postgres:16-alpine
    container_name: pharmalink_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pharmalink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharmalink}
      POSTGRES_DB: ${POSTGRES_DB:-pharmalink}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pharmalink} -d ${POSTGRES_DB:-pharmalink}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: pharmalink_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: migrate/migrate:v4.18.3
    container_name: pharmalink_migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path=/migrations",
        "-database=postgres://${POSTGRES_USER:-pharmalink}:${POSTGRES_PASSWORD:-pharmalink}@postgres:5432/${POSTGRES_DB:-pharmalink}?sslmode=disable",
        "up"
      ]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: pharmalink-backend:latest
    container_name: pharmalink_api
    command: ["/app/api"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_ADDR: redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    expose:
      - "8080"
    restart: unless-stopped

  worker:
    image: pharmalink-backend:latest
    container_name: pharmalink_worker
    command: ["/app/worker"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_ADDR: redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: pharmalink_nginx
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
